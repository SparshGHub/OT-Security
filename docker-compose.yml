services:
  postgres:
    image: postgres:15-alpine
    container_name: dcs-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./sql/seed_topology.sql:/docker-entrypoint-initdb.d/2-seed-topology.sql
      - ./sql/seed_rules.sql:/docker-entrypoint-initdb.d/3-seed-rules.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: dcs-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:4000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=5432
      - BACKEND_PORT=4000
      - JWT_SECRET=${JWT_SECRET}
    command: npm start

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        # IMPORTANT: the browser must be able to reach this host:port
        - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    container_name: dcs-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:3000"
    environment:
      - NODE_ENV=production


volumes:
  pg_data:

